<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cascade Flow Control Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="ambient-bg"></div>

    <main class="app-shell">
      <section class="panel login-panel" id="loginPanel">
        <p class="eyebrow">Cascade Smart Logistics</p>
        <h1>Peak Rush Command Deck</h1>
        <p class="subtitle">
          Sign in as a Truck Driver or Warehouse Manager to monitor parcel flow,
          routes, and capacity in real-time.
        </p>

        <div class="role-toggle" role="group" aria-label="Select login role">
          <span class="toggle-pill" id="togglePill"></span>
          <button class="role-btn active" id="driverRoleBtn" data-role="driver">
            Truck Driver
          </button>
          <button class="role-btn" id="managerRoleBtn" data-role="manager">
            Warehouse Manager
          </button>
        </div>

        <form id="loginForm" class="login-form">
          <label>
            Username
            <input type="text" id="username" placeholder="Enter username" required />
          </label>
          <label>
            Password
            <input type="password" id="password" placeholder="Enter password" required />
          </label>
          <button type="submit" class="primary-btn">Login</button>
          <p class="hint" id="loginHint">
            Demo credentials: driver01 / drive@01 (Truck Driver)
          </p>
          <p class="error" id="loginError" aria-live="polite"></p>
        </form>
      </section>

      <section class="panel dashboard hidden" id="dashboardPanel">
        <header class="dashboard-header">
          <div>
            <p class="eyebrow" id="roleTag"></p>
            <h2 id="welcomeTitle"></h2>
          </div>
          <button id="logoutBtn" class="ghost-btn">Logout</button>
        </header>

        <div id="dashboardContent"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
